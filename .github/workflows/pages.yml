name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Trigger one-time PWA implementation
        shell: bash
        run: |
          printf '\n# Triggered by the Pages bootstrap commit.\n' >> .github/workflows/apply-pwa-unit-week-once.yml
          cat <<'EOF' > .github/workflows/pages.yml
          name: Deploy GitHub Pages

          on:
            push:
              branches:
                - main
            workflow_dispatch:

          permissions:
            contents: read
            pages: write
            id-token: write

          concurrency:
            group: pages
            cancel-in-progress: true

          jobs:
            build:
              runs-on: ubuntu-latest
              timeout-minutes: 10

              steps:
                - name: Check out repository
                  uses: actions/checkout@v4

                - name: Set up Node.js
                  uses: actions/setup-node@v4
                  with:
                    node-version: 22.16.0
                    cache: npm

                - name: Install dependencies
                  run: npm ci --no-audit --no-fund

                - name: Configure Pages
                  uses: actions/configure-pages@v5

                - name: Build
                  run: npm run build

                - name: Upload Pages artifact
                  uses: actions/upload-pages-artifact@v4
                  with:
                    path: ./dist

            deploy:
              environment:
                name: github-pages
                url: ${{ steps.deployment.outputs.page_url }}

              runs-on: ubuntu-latest
              needs: build

              steps:
                - name: Deploy to GitHub Pages
                  id: deployment
                  uses: actions/deploy-pages@v4
          EOF
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/workflows/pages.yml .github/workflows/apply-pwa-unit-week-once.yml
          git commit -m "chore: trigger PWA implementation workflow"
          git push

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Build
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
